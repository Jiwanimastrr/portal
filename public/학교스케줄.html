<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교별 하교 시간 안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
        .school-card {
            transition: all 0.2s ease-in-out;
        }
        .day-btn, .view-btn {
            transition: all 0.2s;
        }
        .day-btn.active, .view-btn.active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
        }
        .time-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .time-12 { background-color: #fef3c7; color: #92400e; }
        .time-13 { background-color: #dcfce7; color: #166534; }
        .time-14 { background-color: #dbeafe; color: #1e40af; }
        .time-15 { background-color: #f3e8ff; color: #6b21a8; }
        .time-16 { background-color: #ffe4e6; color: #9f1239; }
        
        /* Table responsive wrapper */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-6 text-center">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-2">✨ 하교 시간 한눈에 보기</h1>
            <p class="text-sm text-gray-500" id="currentDateDisplay"></p>
        </header>

        <!-- Controls Area -->
        <div class="bg-white rounded-3xl shadow-sm p-4 mb-6 border border-gray-100">
            <!-- School Type Tabs -->
            <div class="flex p-1 bg-gray-100 rounded-2xl mb-4">
                <button onclick="switchTab('elem')" id="tab-elem" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all bg-white shadow-sm text-blue-600">초등학교</button>
                <button onclick="switchTab('mid')" id="tab-mid" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all text-gray-500">중학교</button>
            </div>

            <div class="flex flex-col md:flex-row gap-4 mb-4">
                <!-- Day Selector -->
                <div class="flex flex-1 justify-between gap-1" id="daySelector">
                    <button onclick="setDay(1)" data-day="1" class="day-btn flex-1 py-2 text-sm font-bold rounded-xl bg-gray-50 text-gray-500">월</button>
                    <button onclick="setDay(2)" data-day="2" class="day-btn flex-1 py-2 text-sm font-bold rounded-xl bg-gray-50 text-gray-500">화</button>
                    <button onclick="setDay(3)" data-day="3" class="day-btn flex-1 py-2 text-sm font-bold rounded-xl bg-gray-50 text-gray-500">수</button>
                    <button onclick="setDay(4)" data-day="4" class="day-btn flex-1 py-2 text-sm font-bold rounded-xl bg-gray-50 text-gray-500">목</button>
                    <button onclick="setDay(5)" data-day="5" class="day-btn flex-1 py-2 text-sm font-bold rounded-xl bg-gray-50 text-gray-500">금</button>
                    <button onclick="setDay(0)" data-day="0" class="day-btn flex-1 py-2 text-sm font-bold rounded-xl bg-gray-50 text-gray-500">전체</button>
                </div>

                <!-- View Mode Switcher -->
                <div class="flex bg-gray-100 p-1 rounded-xl">
                    <button onclick="setViewMode('card')" id="view-card" class="view-btn px-4 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-blue-600">카드 보기</button>
                    <button onclick="setViewMode('table')" id="view-table" class="view-btn px-4 py-2 text-xs font-bold rounded-lg text-gray-500">표로 보기</button>
                </div>
            </div>

            <!-- Search -->
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="render()" placeholder="학교 이름을 입력하세요..." 
                       class="w-full pl-10 pr-4 py-3 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                <span class="absolute left-3 top-3.5 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
            </div>
        </div>

        <!-- Content Container -->
        <div id="contentDisplay" class="space-y-4">
            <!-- Content will be injected by JS -->
        </div>

        <!-- Footer -->
        <footer class="mt-10 pb-10 text-center">
            <p class="text-xs text-gray-400">© 학교 하교 안내 도우미 | 데이터 기반 실시간 조회</p>
        </footer>
    </div>

    <script>
        const elementaryData = [
            {
                name: "고산하늘초",
                schedules: [
                    { grade: "1,2학년", days: { 1: "12:50", 2: "13:40", 3: "13:40", 4: "13:40", 5: "12:50" }, periods: { 1: 4, 2: 5, 3: 5, 4: 5, 5: 4 } },
                    { grade: "3,4학년", days: { 1: "13:40", 2: "13:40", 3: "13:40", 4: "14:30", 5: "13:40" }, periods: { 1: 5, 2: 5, 3: 5, 4: 6, 5: 5 } },
                    { grade: "5,6학년", days: { 1: "14:30", 2: "14:30", 3: "13:40", 4: "14:30", 5: "14:30" }, periods: { 1: 6, 2: 6, 3: 5, 4: 6, 5: 6 } }
                ]
            },
            {
                name: "광남초",
                schedules: [
                    { grade: "1학년", days: { 1: "13:00", 2: "13:50", 3: "13:00", 4: "13:50", 5: "13:50" }, periods: { 1: 4, 2: 5, 3: 4, 4: 5, 5: 5 } },
                    { grade: "2학년", days: { 1: "13:00", 2: "13:50", 3: "13:00", 4: "13:50", 5: "13:50" }, note: "월요일 4/5병행", periods: { 1: 4, 2: 5, 3: 4, 4: 5, 5: 5 } },
                    { grade: "3,4학년", days: { 1: "13:50", 2: "14:40", 3: "13:00", 4: "14:40", 5: "13:50" }, periods: { 1: 5, 2: 6, 3: 4, 4: 6, 5: 5 } },
                    { grade: "5,6학년", days: { 1: "14:40", 2: "14:40", 3: "13:50", 4: "14:40", 5: "14:40" }, periods: { 1: 6, 2: 6, 3: 5, 4: 6, 5: 6 } }
                ]
            },
            {
                name: "고산별빛초",
                schedules: [
                    { grade: "1,2학년", days: { 1: "12:50", 2: "13:30", 3: "13:30", 4: "13:30", 5: "12:50" }, periods: { 1: 4, 2: 5, 3: 5, 4: 5, 5: 4 } },
                    { grade: "3,4학년", days: { 1: "13:40", 2: "13:40", 3: "13:40", 4: "14:20", 5: "13:40" }, periods: { 1: 5, 2: 5, 3: 5, 4: 6, 5: 5 } },
                    { grade: "5,6학년", days: { 1: "14:20", 2: "14:20", 3: "13:40", 4: "14:20", 5: "14:20" }, periods: { 1: 6, 2: 6, 3: 5, 4: 6, 5: 6 } }
                ]
            },
            {
                name: "오포초",
                note: "하교 지도 10분 포함",
                schedules: [
                    { grade: "1학년", days: { 1: "13:00", 2: "13:50", 3: "13:00", 4: "13:50", 5: "13:50" }, periods: { 1: 4, 2: 5, 3: 4, 4: 5, 5: 5 } },
                    { grade: "2학년", days: { 1: "13:00", 2: "13:50", 3: "13:00~50", 4: "13:50", 5: "13:50" }, periods: { 1: 4, 2: 5, 3: "4/5", 4: 5, 5: 5 } },
                    { grade: "3,4학년", days: { 1: "13:50", 2: "14:40", 3: "13:50", 4: "13:50", 5: "13:50" }, periods: { 1: 5, 2: 6, 3: 5, 4: 5, 5: 5 } },
                    { grade: "5,6학년", days: { 1: "14:40", 2: "14:40", 3: "13:50", 4: "14:40", 5: "14:40" }, periods: { 1: 6, 2: 6, 3: 5, 4: 6, 5: 6 } }
                ]
            },
            {
                name: "태성초",
                schedules: [
                    { grade: "1학년", days: { 1: "12:50", 2: "13:40", 3: "13:40", 4: "13:40", 5: "12:50" }, periods: { 1: 4, 2: 5, 3: 5, 4: 5, 5: 4 } },
                    { grade: "2학년", days: { 1: "12:50", 2: "13:40", 3: "13:40", 4: "13:40", 5: "12:50" }, periods: { 1: 4, 2: 5, 3: 5, 4: 5, 5: 4 } },
                    { grade: "3,4학년", days: { 1: "13:40", 2: "14:30", 3: "13:40", 4: "13:40", 5: "13:40" }, periods: { 1: 5, 2: 6, 3: 5, 4: 5, 5: 5 } },
                    { grade: "5,6학년", days: { 1: "14:30", 2: "14:30", 3: "14:30", 4: "14:30", 5: "13:40" }, periods: { 1: 6, 2: 6, 3: 6, 4: 6, 5: 5 } }
                ]
            },
            {
                name: "한아람초",
                schedules: [
                    { grade: "1,2학년", days: { 1: "12:40", 2: "13:30", 3: "13:30", 4: "13:30", 5: "12:40" }, periods: { 1: 4, 2: 5, 3: 5, 4: 5, 5: 4 } },
                    { grade: "3,4학년", days: { 1: "13:30", 2: "13:30", 3: "13:30", 4: "14:10", 5: "13:30" }, periods: { 1: 5, 2: 5, 3: 5, 4: 6, 5: 5 } },
                    { grade: "5,6학년", days: { 1: "14:10", 2: "14:10", 3: "14:10", 4: "14:10", 5: "13:30" }, periods: { 1: 6, 2: 6, 3: 6, 4: 6, 5: 5 } }
                ]
            }
        ];

        const middleData = [
            { name: "태전중", schedules: [{ grade: "전학년", days: { 1: "16:20", 2: "16:20", 3: "15:25", 4: "15:25", 5: "15:25" }, periods: { 1: 7, 2: 7, 3: 6, 4: 6, 5: 6 } }] },
            { name: "경안중", schedules: [{ grade: "전학년", days: { 1: "16:15", 2: "16:15", 3: "15:20", 4: "15:20", 5: "15:20" }, periods: { 1: 7, 2: 7, 3: 6, 4: 6, 5: 6 } }] },
            { name: "광남중", schedules: [{ grade: "전학년", days: { 1: "16:05", 2: "16:05", 3: "15:10", 4: "15:10", 5: "15:10" }, periods: { 1: 7, 2: 7, 3: 6, 4: 6, 5: 6 } }] },
            { name: "오포중", schedules: [{ grade: "전학년", days: { 1: "16:15", 2: "16:15", 3: "15:20", 4: "15:20", 5: "15:20" }, periods: { 1: 7, 2: 7, 3: 6, 4: 6, 5: 6 } }] },
            { name: "탄벌중", schedules: [{ grade: "전학년", days: { 1: "16:15", 2: "16:15", 3: "15:20", 4: "15:20", 5: "15:20" }, periods: { 1: 7, 2: 7, 3: 6, 4: 6, 5: 6 } }] }
        ];

        let currentType = 'elem';
        let viewMode = 'card'; // 'card' or 'table'
        let selectedDay = new Date().getDay();
        if (selectedDay === 0 || selectedDay === 6) selectedDay = 1;

        const dayNames = ["일", "월", "화", "수", "목", "금", "토"];

        function getTimeColorClass(timeStr) {
            if (!timeStr) return "";
            const hour = parseInt(timeStr.substring(0, 2));
            if (hour === 12) return "time-12";
            if (hour === 13) return "time-13";
            if (hour === 14) return "time-14";
            if (hour === 15) return "time-15";
            if (hour === 16) return "time-16";
            return "bg-gray-100 text-gray-600";
        }

        function switchTab(type) {
            currentType = type;
            const isElem = type === 'elem';
            document.getElementById('tab-elem').className = isElem ? "flex-1 py-2 text-sm font-bold rounded-xl transition-all bg-white shadow-sm text-blue-600" : "flex-1 py-2 text-sm font-bold rounded-xl transition-all text-gray-500";
            document.getElementById('tab-mid').className = !isElem ? "flex-1 py-2 text-sm font-bold rounded-xl transition-all bg-white shadow-sm text-blue-600" : "flex-1 py-2 text-sm font-bold rounded-xl transition-all text-gray-500";
            render();
        }

        function setDay(day) {
            selectedDay = day;
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.day) === day);
            });
            render();
        }

        function setViewMode(mode) {
            viewMode = mode;
            document.getElementById('view-card').className = mode === 'card' ? "view-btn px-4 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-blue-600" : "view-btn px-4 py-2 text-xs font-bold rounded-lg text-gray-500";
            document.getElementById('view-table').className = mode === 'table' ? "view-btn px-4 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-blue-600" : "view-btn px-4 py-2 text-xs font-bold rounded-lg text-gray-500";
            render();
        }

        function render() {
            const container = document.getElementById('contentDisplay');
            const search = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';

            const data = currentType === 'elem' ? elementaryData : middleData;
            const filtered = data.filter(s => s.name.toLowerCase().includes(search));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-400">결과를 찾을 수 없습니다.</div>`;
                return;
            }

            if (viewMode === 'card') {
                renderCardView(filtered, container);
            } else {
                renderTableView(filtered, container);
            }
        }

        function renderCardView(data, container) {
            container.className = "space-y-4";
            data.forEach(school => {
                const card = document.createElement('div');
                card.className = "school-card bg-white rounded-2xl p-5 shadow-sm border border-gray-100";
                
                let html = `
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-gray-800">${school.name}</h3>
                        ${school.note ? `<span class="text-[10px] bg-amber-50 text-amber-600 px-2 py-1 rounded-lg font-medium">${school.note}</span>` : ''}
                    </div>
                    <div class="space-y-3">
                `;

                school.schedules.forEach(s => {
                    if (selectedDay === 0) {
                        html += `<div class="bg-gray-50 rounded-xl p-3">
                                    <div class="text-xs font-bold text-gray-400 mb-2">${s.grade}</div>
                                    <div class="grid grid-cols-5 gap-1">
                                        ${[1,2,3,4,5].map(d => `
                                            <div class="text-center">
                                                <div class="text-[10px] text-gray-400 mb-1">${dayNames[d]}</div>
                                                <div class="text-[11px] font-bold ${d === new Date().getDay() ? 'text-blue-600 underline' : 'text-gray-600'}">${s.days[d].split(' ')[0]}</div>
                                            </div>
                                        `).join('')}
                                    </div>
                                 </div>`;
                    } else {
                        const time = s.days[selectedDay];
                        const period = s.periods[selectedDay];
                        html += `
                            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                                <span class="text-sm font-bold text-gray-600">${s.grade}</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-xs text-gray-400 font-medium">${period}교시</span>
                                    <span class="time-badge ${getTimeColorClass(time)}">${time}</span>
                                </div>
                            </div>
                        `;
                    }
                });

                html += `</div>`;
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        function renderTableView(data, container) {
            const wrapper = document.createElement('div');
            wrapper.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden";
            
            let html = `
                <div class="table-container">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 text-gray-500 font-bold border-b border-gray-100">
                            <tr>
                                <th class="px-4 py-3 min-w-[120px]">학교명</th>
                                <th class="px-4 py-3 min-w-[100px]">학년</th>
                                <th class="px-2 py-3 text-center">월</th>
                                <th class="px-2 py-3 text-center">화</th>
                                <th class="px-2 py-3 text-center">수</th>
                                <th class="px-2 py-3 text-center">목</th>
                                <th class="px-2 py-3 text-center">금</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
            `;

            data.forEach(school => {
                school.schedules.forEach((s, idx) => {
                    html += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            ${idx === 0 ? `<td class="px-4 py-4 font-bold text-gray-800 align-top" rowspan="${school.schedules.length}">
                                            ${school.name}
                                            ${school.note ? `<div class="text-[9px] text-amber-600 font-normal mt-1">${school.note}</div>` : ''}
                                          </td>` : ''}
                            <td class="px-4 py-4 text-gray-500 font-medium">${s.grade}</td>
                            ${[1,2,3,4,5].map(d => {
                                const time = s.days[d].split(' ')[0];
                                const isToday = d === new Date().getDay();
                                return `<td class="px-1 py-4 text-center">
                                            <div class="flex flex-col items-center">
                                                <span class="time-badge ${getTimeColorClass(time)} ${isToday ? 'ring-2 ring-blue-400 ring-offset-1' : ''}">${time}</span>
                                                <span class="text-[9px] text-gray-400 mt-1">${s.periods[d]}교시</span>
                                            </div>
                                        </td>`;
                            }).join('')}
                        </tr>
                    `;
                });
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;
            wrapper.innerHTML = html;
            container.appendChild(wrapper);
        }

        window.onload = () => {
            const today = new Date();
            const dateStr = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일 (${dayNames[today.getDay()]}요일)`;
            document.getElementById('currentDateDisplay').innerText = dateStr;
            setDay(selectedDay);
        };
    </script>
</body>
</html>
