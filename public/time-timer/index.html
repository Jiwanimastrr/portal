<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Willgrow Time Timer</title>
  <style>
    :root {
      --primary-color: #ff3b30; /* Red */
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text-color: #ffffff;
      --disk-bg: rgba(255, 255, 255, 0.05); /* Translucent empty track */
      --modal-bg: rgba(20, 20, 30, 0.6);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1b1b2f, #162447, #1f4068, #e43f5a);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating shapes */
    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
    }
    .shape1 {
      width: 400px; height: 400px;
      background: #e43f5a;
      top: -100px; left: -100px;
      opacity: 0.6;
      animation: float1 10s ease-in-out infinite alternate;
    }
    .shape2 {
      width: 500px; height: 500px;
      background: #1f4068;
      bottom: -150px; right: -100px;
      opacity: 0.7;
      animation: float2 12s ease-in-out infinite alternate;
    }
    .shape3 {
      width: 300px; height: 300px;
      background: #e94560;
      top: 40%; left: 30%;
      opacity: 0.5;
      animation: float3 15s ease-in-out infinite alternate;
    }

    @keyframes float1 { 100% { transform: translateY(50px) translateX(50px); } }
    @keyframes float2 { 100% { transform: translateY(-50px) translateX(-50px); } }
    @keyframes float3 { 100% { transform: scale(1.2); } }

    header {
      position: absolute;
      top: 30px;
      display: flex;
      justify-content: space-between;
      width: 100%;
      padding: 0 50px;
      z-index: 10;
      align-items: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 15px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      padding: 10px 25px;
      border-radius: 30px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .logo-container img {
      height: 30px;
      object-fit: contain;
    }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #fff;
      text-transform: uppercase;
    }

    .header-controls {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    /* Glass effect */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    button {
      border-radius: 20px;
      padding: 15px 25px;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
      border-color: rgba(255,255,255,0.4);
    }
    
    button:active {
      transform: translateY(0);
    }

    button.icon-btn {
      padding: 12px;
      border-radius: 50%;
      font-size: 1.5rem;
      width: 55px;
      height: 55px;
    }

    /* Special style for sound toggle text */
    #soundSelectBtn {
      border-radius: 25px;
      padding: 10px 20px;
      font-size: 1.1rem;
      min-width: 120px;
    }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
      width: 100%;
      max-width: 1000px;
      padding: 40px;
      border-radius: 40px;
      z-index: 1;
      margin-top: 60px;
    }

    /* Timer Disk */
    .timer-container {
      position: relative;
      width: 50vw;
      max-width: 500px;
      height: 50vw;
      max-height: 500px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: conic-gradient(var(--disk-bg) 0deg, var(--primary-color) 0deg, var(--primary-color) 360deg);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 0 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      transition: box-shadow 0.3s;
    }
    .timer-container::before {
      content: '';
      position: absolute;
      top: -10px; left: -10px; right: -10px; bottom: -10px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
      pointer-events: none;
    }

    .timer-center {
      position: absolute;
      width: 78%;
      height: 78%;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 4px 20px rgba(255,255,255,0.1), 0 15px 40px rgba(0,0,0,0.5);
      cursor: pointer;
      user-select: none;
      transition: all 0.3s;
      background: rgba(20, 20, 30, 0.4);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .timer-center:hover {
      background: rgba(20, 20, 30, 0.6);
      border-color: rgba(255,255,255,0.2);
      transform: scale(1.02);
      box-shadow: inset 0 4px 25px rgba(255,255,255,0.2), 0 20px 50px rgba(0,0,0,0.6);
    }

    .time-display {
      font-size: 6rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
      color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    @media (min-width: 768px) {
      .time-display { font-size: 9rem; }
    }

    /* Controls / Presets */
    .presets {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      width: 100%;
    }

    .presets button {
      flex: 1 1 calc(25% - 20px);
      min-width: 140px;
      padding: 18px 25px;
      font-size: 1.25rem;
      letter-spacing: 0.5px;
    }

    /* Distinct Custom Button styled as a distinct accent */
    .presets button.custom-btn {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.1);
      font-weight: 800;
      color: #fff;
    }
    .presets button.custom-btn:hover {
      background: rgba(255, 255, 255, 0.4);
      border-color: rgba(255, 255, 255, 0.8);
    }

    .color-themes {
      display: flex;
      gap: 15px;
      align-items: center;
      padding: 10px 20px;
      border-radius: 35px;
    }

    .theme-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .theme-btn:hover {
      transform: scale(1.15);
      border-color: rgba(255,255,255,0.8);
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
    }
    .theme-btn.active {
      transform: scale(1.2);
      border-color: #fff;
      box-shadow: 0 0 15px rgba(255,255,255,0.8);
    }

    /* Visual Alarm Effect */
    @keyframes flashContainer {
      0%, 100% { filter: brightness(1) saturate(1); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
      50% { filter: brightness(1.3) saturate(1.5); box-shadow: 0 0 80px var(--primary-color), inset 0 0 40px var(--primary-color); }
    }
    
    body.visual-alarm .timer-container {
      animation: flashContainer 1s ease-in-out infinite;
      border-color: var(--primary-color);
    }

    /* Custom Input Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: var(--modal-bg);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 40px;
      border-radius: 32px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
    }
    .modal h2 { 
      margin-bottom: 30px; 
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .modal input {
      width: 100px;
      font-size: 3rem;
      text-align: center;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      margin: 0 10px;
      font-weight: bold;
      color: #fff;
      background: rgba(0,0,0,0.3);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .modal input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 15px var(--primary-color);
    }
    .modal .input-group {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 40px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .modal-actions {
      display: flex;
      gap: 15px;
    }
    .modal-actions button {
      flex: 1;
      padding: 15px;
      font-size: 1.25rem;
    }
    .modal-actions button.primary {
      background: var(--primary-color);
      color: #fff;
      border-color: transparent;
    }
    .modal-actions button.primary:hover {
      background: #ff4b40;
      box-shadow: 0 10px 30px rgba(255,59,48,0.4);
    }

  </style>
</head>
<body>

  <!-- Background decorative shapes -->
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>
  <div class="shape shape3"></div>

  <header>
    <div class="logo-container">
      <img src="/logo.png" alt="Willgrow Logo">
      <span class="logo-text">Willgrow</span>
    </div>
    <div class="header-controls">
      <div class="color-themes glass">
        <button class="theme-btn active" style="background-color: #ff3b30;" data-color="#ff3b30" aria-label="Red Theme"></button>
        <button class="theme-btn" style="background-color: #007aff;" data-color="#007aff" aria-label="Blue Theme"></button>
        <button class="theme-btn" style="background-color: #34c759;" data-color="#34c759" aria-label="Green Theme"></button>
        <button class="theme-btn" style="background-color: #ffcc00;" data-color="#ffcc00" aria-label="Yellow Theme"></button>
      </div>
      
      <!-- Alarm Sound Selector Button -->
      <button id="soundSelectBtn" class="glass" aria-label="알람 소리 변경" title="알람 소리 바꾸기">
        🎵 차임벨
      </button>

      <button id="soundToggle" class="icon-btn glass" aria-label="소리 켜기/끄기" title="음소거">
        🔊
      </button>
      <button id="fullscreenToggle" class="icon-btn glass" aria-label="전체화면" title="전체화면 전환">
        ⛶
      </button>
    </div>
  </header>

  <div class="main-container">
    <div class="timer-container" id="timerDisk">
      <div class="timer-center" id="playPauseBtn" title="시작/일시정지">
        <div class="time-display" id="timeDisplay">00:00</div>
      </div>
    </div>

    <div class="presets">
      <button class="glass" onclick="setTimer(60)">⏱️ 1분</button>
      <button class="glass" onclick="setTimer(180)">⏱️ 3분</button>
      <button class="glass" onclick="setTimer(300)">⏱️ 5분</button>
      <button class="glass custom-btn" onclick="openCustomModal()">✏️ 직접 입력</button>
    </div>
  </div>

  <!-- Custom Time Modal -->
  <div class="modal-overlay" id="customModal">
    <div class="modal">
      <h2>시간 상세 설정</h2>
      <div class="input-group">
        <input type="number" id="customMin" min="0" max="99" value="0" placeholder="00"> :
        <input type="number" id="customSec" min="0" max="59" value="0" placeholder="00">
      </div>
      <div class="modal-actions">
        <button class="glass" onclick="closeCustomModal()">취소</button>
        <button class="glass primary" onclick="applyCustomTime()">시작하기</button>
      </div>
    </div>
  </div>

  <script>
    // Elements
    const timeDisplay = document.getElementById('timeDisplay');
    const timerDisk = document.getElementById('timerDisk');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const soundToggle = document.getElementById('soundToggle');
    const soundSelectBtn = document.getElementById('soundSelectBtn');
    const fullscreenToggle = document.getElementById('fullscreenToggle');
    const themeBtns = document.querySelectorAll('.theme-btn');
    const customModal = document.getElementById('customModal');
    
    // State
    let totalSeconds = 0;
    let remainingSeconds = 0;
    let timerInterval = null;
    let isRunning = false;
    let isSoundOn = true;
    let currentPrimaryColor = '#ff3b30';

    // Audio Context (Web Audio API for soft chime)
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // Alarm Sound Definitions
    const sounds = [
      { id: 'chime', name: '🎵 차임벨', func: playChime },
      { id: 'marimba', name: '🎵 마림바', func: playMarimba },
      { id: 'beep', name: '🎵 비프음', func: playBeep },
      { id: 'jingle', name: '🎵 징글', func: playJingle }
    ];
    let currentSoundIdx = 0;

    // Chime (Original)
    function playChime() {
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t); // A5
      osc.frequency.exponentialRampToValueAtTime(440, t + 1.5);
      gainNode.gain.setValueAtTime(0, t);
      gainNode.gain.linearRampToValueAtTime(0.5, t + 0.05);
      gainNode.gain.exponentialRampToValueAtTime(0.01, t + 1.5);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 1.5);
    }

    // Marimba (C Major 7 chord)
    function playMarimba() {
      const t = audioCtx.currentTime;
      function createTone(freq, startTime) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gainNode.gain.setValueAtTime(0, startTime);
        gainNode.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 1.5);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + 1.5);
      }
      createTone(523.25, t + 0.00); // C5
      createTone(659.25, t + 0.08); // E5
      createTone(783.99, t + 0.16); // G5
      createTone(987.77, t + 0.24); // B5
    }

    // Beep (Retro Timer Alarm)
    function playBeep() {
      const t = audioCtx.currentTime;
      function createBeep(startTime) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = 800;
        gainNode.gain.setValueAtTime(0, startTime);
        gainNode.gain.linearRampToValueAtTime(0.1, startTime + 0.02);
        gainNode.gain.linearRampToValueAtTime(0, startTime + 0.15);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + 0.15);
      }
      createBeep(t);
      createBeep(t + 0.2);
      createBeep(t + 0.4);
    }

    // Jingle (Happy finish)
    function playJingle() {
      const t = audioCtx.currentTime;
      function createTone(freq, startTime, dur) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gainNode.gain.setValueAtTime(0, startTime);
        gainNode.gain.linearRampToValueAtTime(0.15, startTime + 0.02);
        gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + dur);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + dur);
      }
      createTone(523.25, t + 0.0, 0.2);
      createTone(587.33, t + 0.15, 0.2);
      createTone(659.25, t + 0.3, 0.5);
      createTone(783.99, t + 0.5, 1.0);
    }

    // Sound Selector Action
    soundSelectBtn.addEventListener('click', () => {
      initAudio();
      currentSoundIdx = (currentSoundIdx + 1) % sounds.length;
      soundSelectBtn.textContent = sounds[currentSoundIdx].name;
      // Play a short preview of the selected sound
      if (isSoundOn) {
        sounds[currentSoundIdx].func();
      }
    });

    // Formatting MM:SS
    function formatTime(seconds) {
      if (seconds <= 0) return "00:00";
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (Math.floor(seconds) % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    // Updating UI
    function updateUI() {
      timeDisplay.textContent = formatTime(remainingSeconds);
      
      if (totalSeconds > 0) {
        const sweptDegrees = 360 - (remainingSeconds / totalSeconds) * 360;
        timerDisk.style.background = `conic-gradient(var(--disk-bg) 0deg, var(--disk-bg) ${sweptDegrees}deg, var(--primary-color) ${sweptDegrees}deg, var(--primary-color) 360deg)`;
      } else {
        timerDisk.style.background = `conic-gradient(var(--disk-bg) 0deg, var(--disk-bg) 360deg)`;
      }
    }

    // Setting Timer
    window.setTimer = function(seconds) {
      document.body.classList.remove('visual-alarm');
      
      totalSeconds = seconds;
      remainingSeconds = seconds;
      updateUI();
      
      if (isRunning) {
        clearInterval(timerInterval);
        startTimerInterval();
      } else {
        togglePlayPause(); // Auto start
      }
    }

    // Timer Interval Logic
    function startTimerInterval() {
      const updateInterval = 100; // ms
      timerInterval = setInterval(() => {
        remainingSeconds -= updateInterval / 1000;
        if (remainingSeconds <= 0) {
          remainingSeconds = 0;
          timerComplete();
        }
        updateUI();
      }, updateInterval);
    }

    function togglePlayPause() {
      initAudio();
      document.body.classList.remove('visual-alarm');
      
      if (totalSeconds <= 0) return;

      if (isRunning) {
        clearInterval(timerInterval);
        isRunning = false;
        // Dimming effect on pause
        timerDisk.style.opacity = '0.7';
      } else {
        if(remainingSeconds <= 0) remainingSeconds = totalSeconds;
        timerDisk.style.opacity = '1';
        startTimerInterval();
        isRunning = true;
      }
    }

    playPauseBtn.addEventListener('click', togglePlayPause);

    function timerComplete() {
      clearInterval(timerInterval);
      isRunning = false;
      updateUI();
      
      if (isSoundOn) {
        sounds[currentSoundIdx].func(); // Play the selected sound!
      } else {
        document.body.classList.add('visual-alarm');
        setTimeout(() => {
          document.body.classList.remove('visual-alarm');
        }, 5000);
      }
    }

    // Stop visual alarm early on interaction
    document.body.addEventListener('click', (e) => {
      if(document.body.classList.contains('visual-alarm')) {
        document.body.classList.remove('visual-alarm');
      }
    });

    // Sound Mute/Unmute Toggle
    soundToggle.addEventListener('click', () => {
      isSoundOn = !isSoundOn;
      soundToggle.textContent = isSoundOn ? '🔊' : '🔇';
    });

    // Fullscreen Toggle
    fullscreenToggle.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.error(`Error attempting to enable full-screen mode: ${err.message}`);
        });
        fullscreenToggle.textContent = '🗗';
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
        fullscreenToggle.textContent = '⛶';
      }
    });

    // Theme Switch
    themeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        themeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPrimaryColor = btn.getAttribute('data-color');
        document.documentElement.style.setProperty('--primary-color', currentPrimaryColor);
        updateUI();
      });
    });

    // Custom Modal
    window.openCustomModal = function() {
      customModal.classList.add('show');
      document.getElementById('customMin').focus();
    }
    window.closeCustomModal = function() {
      customModal.classList.remove('show');
    }
    window.applyCustomTime = function() {
      const min = parseInt(document.getElementById('customMin').value) || 0;
      const sec = parseInt(document.getElementById('customSec').value) || 0;
      const total = (min * 60) + sec;
      if (total > 0) {
        setTimer(total);
        closeCustomModal();
      }
    }

    customModal.addEventListener('click', (e) => {
      if(e.target === customModal) closeCustomModal();
    });
    
    document.addEventListener('mousedown', function() {
      document.body.classList.add('using-mouse');
    });
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Tab') {
        document.body.classList.remove('using-mouse');
      }
    });

    updateUI();
  </script>
</body>
</html>
